# Forge Peg Insertion + Control Action Interface (ctrl-action-interface).
# CtrlActionInterfaceWrapper is a HybridVICWrapper whose pose stiffness K, pose damping D, and
# force stiffness K_f are produced from a CONFIG-SELECTABLE action-space formulation rather than
# raw 6x6 matrices. Switch formulations by changing `gain_mapping` only. D is always derived from
# K (never sampled); force control is pure stiffness (K_f, no damping). All formulations assume
# policy actions in [-1, 1] and scale them internally.
#
# Action-dim formula: base 7 + 2*N + pdim + (pdim if use_hybrid_force else 0),
#   where N = sum(force_axes) and pdim depends on gain_mapping:
#     constant=0, variable_diagonal=6, cholesky=12, rotated=12.
#   This config (variable_diagonal, force_axes x,y,z => N=3, hybrid on): 7 + 6 + 6 + 6 = 25.
# NOTE: target_entropy is a PLACEHOLDER — the action dim changes with gain_mapping/hybrid, so
# re-tune per formulation; don't read too much into the value.
# Unknown headers/keys are hard errors; omitted sections/fields fall back to defaults.

runner_cfg:
  task: Isaac-Forge-PegInsert-Direct-v0
  disable_success_pred: true
  kp_z_align_enabled: true                # aligns peg z-axis with socket z-axis
  kp_z_align_a: 5.0
  kp_z_align_b: 2
  engagement_quality_enabled: true        # publish engagement_quality/* diagnostics

  # ---- insertion-reward scales + alignment gates ----
  curr_engaged_scale: 1.0
  curr_success_scale: 1.0
  kp_baseline_scale: 1.0
  kp_coarse_scale: 1.0
  kp_fine_scale: 1.0
  engage_check_yaw: false
  engage_check_z_aligned: true
  success_check_yaw: false
  success_check_z_aligned: true
  z_align_max_deg: 10.0
  z_cliff_cutoff_enabled: true    # funnel: zero keypoint reward when below hole mouth AND not centered
  ee_success_yaw_deg: null
  agent_type: sac
  num_envs: 512
  num_agents: 5
  total_timesteps: 20_100
  eval_timesteps: 150
  memory_size: 1_000_000
  seed: -1
  glue_peg_to_gripper: true
  grasp_rot_mode: fixed
  rel_grasp_rot_init_deg: [0.0, 30.0, 0.0]   # [roll, pitch, yaw] deg — the fixed grasp = curriculum tilt max

  env_cfg_overrides:
    task.num_keypoints: 4
    task.keypoint_scale: 0.15
    task.keypoint_coef_baseline: [5, 4]
    task.keypoint_coef_coarse: [50, 2]
    task.keypoint_coef_fine: [100, 0]
    task.contact_penalty_scale: 0.0
    task.action_penalty_ee_scale: 0.0
    task.action_penalty_asset_scale: 0.001
    task.action_grad_penalty_scale: 0.1

loss_cfg:
  supervised_selection_enabled: false
  supervised_selection_policy_weight: 1.0
  supervised_selection_critic_weight: 0.0

# ---- Sampling-Based reset Curriculum (SBC) — own config section ----
reset_curriculum_cfg:
  enabled: true
  increase_rate: 0.05
  decrease_rate: 0.05
  increase_threshold: 0.5
  decrease_threshold: 0.2
  min_pos: [0.0, 0.0, -0.020]    # peg tip 5mm above hole bottom (peg frame)
  min_orn: [0.0, 0.0, 0.0]     # [roll, pitch, yaw] deg: c=0 floor (0,0,0 => start aligned)
  align_below_z: 0.0           # <=0 => auto-derive from grasp offset; peg spawned below hole top => aligned+centered
  success_margin_z: 0.005      # keep peg base >=5mm above the success depth so it never starts in success

sac_cfg:
  tensorboard: false        # log ONLY to wandb (requires experiment.wandb: true)
  gradient_steps: 2
  batch_size: 2048
  discount_factor: 0.99
  polyak: 0.005
  actor_lr: 1.0e-4
  critic_lr: 1.0e-4
  entropy_lr: 3.0e-5
  weight_decay: 1.0e-2
  random_timesteps: 0
  learning_starts: 300
  learn_entropy: true
  initial_entropy_value: 0.05
  target_entropy: -5            # = -|continuous|/2 = -10/2 (7 base + 3 rotated diag gains (fixed R, 3-DOF))
  grad_norm_clip: 1.0
  mixed_precision: false
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: {}
  rewards_shaper_scale: 0.1
  gripper_action_idx: null
  phase_split_families: [RotationFrame, Impedance_Stiffness]
  recorder:
    enabled: false
  experiment:
    directory: eef_glued_peg
    experiment_name: "4_GAS_fixed_rot.yaml"
    write_interval: 150
    checkpoint_interval: auto
    wandb: true
    wandb_kwargs:
      entity: hur

model_cfg:
  actor:
    act_init_std: 1.0
    selection_distribution: product
    actor_n: 2
    actor_latent: 512
    last_layer_scale: 0.1
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    reduction: sum
    use_state_dependent_std: false
    bernoulli_action_dims: null
    force_zero_action_dims: null
    scale_down_action_dims: [0, 1, 2]   # apply last_layer_scale to ONLY the 6 pose deltas (3 pos + 3 orient); gain/selection dims stay unshrunk so they explore
  critic:
    critic_output_init_mean: 0.0
    critic_n: 4
    critic_latent: 1024
    clip_actions: false

controller_cfg:
  # ---- control type selector (the single switch) ----
  # "pose"                  : No wrapper
  # "pose-VICES"            : Applies VICPoseWrapper (diagonal vic only)
  # "hybrid"                : HybridForcePositionWrapper (selection + force only)
  # "hybrid-vic"            : HybridVICWrapper (full raw gain mats + sel + force)
  # "ctrl-action-interface" : CtrlActionInterfaceWrapper (different parameterization of hyprid-vic)
  control_type: ctrl-action-interface

  # ---- formulation selector (the single switch) ----
  # "constant"          : fixed diagonal K from default_task_prop_gains (K_f from
  #                       default_task_force_gains); 0 extra action dims.
  # "variable_diagonal" : per-axis diagonal K, 6 dims, geometric scaling.
  # "cholesky"          : block-diagonal SPD K = blkdiag(L_pos L_posᵀ, L_rot L_rotᵀ), 12 dims
  #                       (per block: 3 L-diagonal + 3 L-off-diagonal). D = zeros for now.
  # "rotated"           : diagonal K (6) + 6-D rotation vector (6) = 12 dims; R applied as
  #                       blkdiag(R,R) to the full 6x6.
  gain_mapping: rotated #"constant" #


  # [roll, pitch, yaw] degrees, XYZ-Euler. Fixed stiffness-frame R for gain_mapping=rotated.
  # R is anchored to the held asset's nominal in-hand frame F_flip (EEF flipped 180° about y,
  # matching factory's grasp convention), so this rpy means the same orientation as the grasp tilt
  # rel_grasp_rot_init_deg on every axis. Set equal to it to align the stiffness ellipsoid with the
  # tilted peg (here both [0,30,0]).
  fixed_rotation_rpy: [0.0, 30.0, 0.0]
  # Toggle force control. When false: NO selection/force-target dims, K_f = zeros, and
  # force_axes MUST be all-zero. When true: force_axes selects eligible axes (adds 2*N dims)
  # and K_f gets its own gain dims (same formulation as pose K).
  use_hybrid_force: false
  force_axes: [0, 0, 0, 0, 0, 0]   # x,y,z force-eligible (must be all-zero when use_hybrid_force=false)
  async_z_force_bounds: true
  # ---- shared per-axis bounds [x,y,z,Rx,Ry,Rz], geometric scaling k = lo*(hi/lo)^((a+1)/2) ----
  # A lower bound < ~1e-6 disables that channel (k=0) instead of producing NaN, so use > 0 for
  # meaningful variable impedance. Translation and rotation differ ~10x, hence the split values.
  gain_min: [400, 400, 400, 20, 20, 20] # pose stiffness K (position x3, rotation x3)
  gain_max: [800, 800, 800, 40, 40, 40] 

  # Policy commands the pose stiffness directly, so disable the base Forge env's per-reset
  # multiplicative gain randomization (default [0.41]x6) to avoid randomizing on top of the
  # commanded gains. Constant-mode configs keep the base default so their fixed gains stay randomized.
  task_prop_gains_noise_level: [0, 0, 0, 0, 0, 0]

  # NOT USED BEFORE
  force_gain_min: [0.35, 0.35, 0.35, 0.07, 0.07, 0.07]  # force stiffness K_f (force x3, torque x3)
  force_gain_max: [0.705, 0.705, 0.705, 0.141, 0.141, 0.141]

  # Cholesky-only: off-diagonal L entry = chol_offdiag_rho * sqrt(lo*hi) * clamp(a,-1,1).
  # 0.0 => diagonal-only (equivalent to variable_diagonal but with 12 dims). Increase to
  # allow within-block (translation- or rotation-) axis coupling.
  chol_offdiag_rho: 0.9

  # cholesky/rotated only: learn the full 6-DOF gain matrix (position + orientation)
  # instead of the translational 3x3 block alone. Changes action dim => re-tune
  # target_entropy if enabled.
  full_gain_matrix: false

  # Full 3-DOF orientation control: command roll/pitch/yaw as a delta-axis-angle rotation
  # scaled by rot_action_bounds, instead of the default yaw-only map (roll/pitch forced to 0).
  # When true, also set the actor's force_zero_action_dims=null so Rx/Ry are learnable, and
  # tune rot_action_bounds (it now governs the orientation cone). Wrapper control types only.
  full_orientation_control: true
  orientation_obs_mode: "6d_rot_mat"   # standardized: same orientation obs across all methods

  # ---- rotation action scaling / per-step clip (Forge defaults) ----
  # rot_action_bounds: action[3:6] scaled to this (rad); governs the orientation cone when
  # full_orientation_control is on. rot_action_threshold: per-step clip on the orientation
  # target change toward the current pose (rad) — becomes env.rot_threshold.
  rot_action_bounds: [1.0, 1.0, 1.0]            # Forge default
  rot_action_threshold: [0.097, 0.097, 0.097]   # Forge default (env.rot_threshold)

  # ---- hybrid force-control fields (used on force-eligible axes when use_hybrid_force) ----
  force_action_bounds: [20.0, 20.0, 20.0]
  torque_action_bounds: [0.25, 0.25, 0.25]
  force_action_threshold: [2.0, 2.0, 2.0]
  torque_action_threshold: [0.01, 0.01, 0.01]

  #default_task_prop_gains: [100, 100, 100, 30, 30, 30]
  default_task_force_gains: [0.5, 0.5, 0.5, 0.1, 0.1, 0.1]   # K_f diagonal in "constant" mode
  #default_task_force_gains: [2.8, 2.8, 2.8, 0.1, 0.1, 0.1]
  async_z_force_bounds: true
  apply_ema_force: false
  no_sel_ema: true
  ema_mode: action
  # NOTE: damping D is derived (2*sqrt(K), or zeros for cholesky), so damping_min/max are
  # unused here; gain_min/gain_max (pose stiffness) ARE used.


  #visualize_rotation_frame: true        # rotation R, at the peg tip (rotated mode only)
  #rotation_frame_axis_scale: 0.02
  #visualize_peg_tip_frame: false         # peg's own orientation, at the peg tip
  #peg_tip_frame_axis_scale: 0.02
  #visualize_eef_frame: false             # actual fingertip (EEF) orientation, at the robot EEF
  #eef_frame_axis_scale: 0.02

  #visualize_stiffness_ellipsoid: true   # translational stiffness ellipsoid (eigendecomp of K_pos)
  #stiffness_ellipsoid_min_scale: 0.001  # 0.2 cm semi-axis at the min gain
  #stiffness_ellipsoid_max_scale: 0.01   # 2 cm   semi-axis at the max gain
  #stiffness_ellipsoid_compliance: false # false=stiffness (stiff=long), true=compliance (stiff=short)
  #stiffness_ellipsoid_opacity: 0.95     # surface opacity [0..1]; lower = more see-through

sensor_cfg:
  contact:
    enabled: true
    contact_force_threshold: 1.0
    log_contact_state: false
    append_to_policy_obs: false
    append_to_critic_state: true
