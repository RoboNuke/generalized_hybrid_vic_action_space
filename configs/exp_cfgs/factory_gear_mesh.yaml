# Factory Gear Mesh (IndustReal-style env). Direct-API task with asymmetric AC.
# action_space=6 (all continuous). obs=21, state=72. Episode: 20s @ 15Hz = 300 steps.
#
# Success prediction via pipeline's BCE head (TrajectoryBufferedMemory auto-selected).
# Every registered ConfigManager header must appear; unknown keys are hard errors.

runner_cfg:
  task: Isaac-Factory-GearMesh-Direct-v0
  num_envs: 256
  num_agents: 1
  total_timesteps: 100_000          # env.step() calls; transitions = total_timesteps * num_envs * num_agents
  eval_timesteps: 300               # env.step() calls (~1 GearMesh episode)
  memory_size: 2_000_000            # replay buffer capacity PER AGENT
  seed: -1                          # -1 = non-deterministic

sac_cfg:
  gradient_steps: 8
  batch_size: 1024                  # per agent
  discount_factor: 0.99
  polyak: 0.005
  actor_lr: 1.0e-4                  # AdamW
  critic_lr: 1.0e-4                 # AdamW
  entropy_lr: 1.0e-4                # AdamW
  weight_decay: 1.0e-2              # decoupled weight decay applied to actor + critic
  random_timesteps: 0
  learning_starts: 300              # >= max_episode_length so every env finalizes
                                    # at least one trajectory before SAC.update()
                                    # fires (TrajectoryBufferedMemory requirement)
  learn_entropy: true
  initial_entropy_value: 1.0e-2
  target_entropy: -3                # -|num_continuous|/2 (= -3 for 6-dim continuous)
  grad_norm_clip: 0.0
  mixed_precision: false
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: {}
  rewards_shaper_scale: null
  gripper_action_idx: null          # no gripper on Factory tasks
  predict_success: true             # use pipeline's BCE success head
  success_td_weight: 1.0            # weight on the success-head TD loss
  success_td_discount: 0.995        # γ for the discounted-success target;
                                    # ≈1 − 1/L → "P(success within ~300 steps)"
  success_info_key: is_success
  success_heatmap_step_bins: 30    # vertical bins on success/fail P-mean heatmaps;
                                    # set to max_episode_length for one row per step
  success_wrapper: null             # auto-detect "factory" wrapper from task prefix
  recorder:
    enabled: false                  # TiledCamera unusable on this IsaacSim/driver/GPU combo;
                                    # see configs/exp_cfgs/default.yaml for the full block.
  experiment:
    directory: runs
    experiment_name: ""
    write_interval: 300             # one episode per write
    checkpoint_interval: auto

model_cfg:
  actor:
    act_init_std: 1.0
    actor_n: 1
    actor_latent: 128
    last_layer_scale: 0.1
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    reduction: sum
    use_state_dependent_std: false
    bernoulli_action_dims: null
    force_zero_action_dims: null    # Factory uses all 6 action dims
  critic:
    critic_output_init_mean: 0.0
    critic_n: 2
    critic_latent: 1024
    clip_actions: false

rescue_buffer_cfg:
  enabled: false                   # master toggle; when false, runner skips all rescue construction
  # ---- Algorithm 1 hyperparameters (required even when disabled — fail-loud convention) ----
  tau: 0.7                         # f_phi(s_t) >= tau ⇒ rescue-point candidate
  delta: 0.3                       # f_phi(s_T) <= delta ⇒ trajectory eligible for rescue extraction
  alpha: 0.25                      # P(overwrite natural reset with rescue init) per done env
  rho_min: 0.3                     # min rolling success rate to (a) add and (b) sample
  window_size: 256                 # rolling-window length (trajectories per agent)
  max_buffer_size: 1024            # per-agent rescue buffer capacity
  # ---- Algorithm extras ----
  dead_point_min_attempts: 3
  action_entropy_first_k_steps: 10
  # ---- Metric publication ----
  metric_compute_interval: 300     # must equal sac_cfg.experiment.write_interval
  buffer_snapshot_interval: 50000
  snapshot_dir: rescue_snapshots
  # ---- Section 5 — diversity / clustering ----
  nn_query_subsample_rollout: 1.0
  nn_distance_percentiles: [5, 25, 50]
  dbscan_eps: null                 # null ⇒ auto-set to 5th-percentile pairwise dist at clustering time
  dbscan_min_samples: 5
  clustering_recompute_threshold: 25
  min_buffer_size_for_clustering: 20
  predictor_ece_n_bins: 10
  projection_method: umap          # "umap" or "pca"
  projection_recompute_threshold: 50
  projection_n_neighbors: 15
  projection_min_dist: 0.1
