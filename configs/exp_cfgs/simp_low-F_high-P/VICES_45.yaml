# Surface Path-Following experiment: simp_low-F_high-P (VICES / variable_diagonal).
# Copied from glued_surface/2_VICES.yaml. Adds the knobs this sweep tunes, exposed at their
# DEFAULT values (flip/edit as needed): directional fragile peg (+ require-contact + reset-in-
# contact), the keypoint-servo action override (target offsets + fixed EEF orientation), and
# every surface reward-term weight. The one per-file difference is the cylinder's fixed grasp
# PITCH relative to the gripper (rel_grasp_rot_init_deg), set to the angle in the file name.
runner_cfg:
  task: Isaac-FlatSurfaceFollow-Direct-v0
  agent_type: sac
  num_envs: 512
  num_agents: 3
  total_timesteps: 20_000
  eval_timesteps: 150
  memory_size: 1_000_000
  seed: -1
  glue_peg_to_gripper: true              # rigidly weld the held cylinder to the gripper (generalized weld)
  # --- Cylinder grasp tilt (rotation of the cylinder RELATIVE TO THE GRIPPER), folded into the
  #     rigid weld frame once at startup. pitch = the angle in this file's name. ---
  grasp_rot_mode: fixed                  # 'none' = aligned grip; 'fixed' = constant weld tilt below
  rel_grasp_rot_init_deg: [0.0, 45.0, 0.0]   # [roll, pitch, yaw] deg; cylinder pitch in the gripper
  # --- Fragile peg (directional break). To enable: flip the three bools on, and set break_force to
  #     [shear_N, normal_N]. efficient_reset is REQUIRED by fragile; direction_break_force makes
  #     break_force a [shear, normal] pair; require_contact_enabled also breaks on loss of contact
  #     after first contact. All OFF by default. ---
  fragile_peg_enabled: true
  efficient_reset_enabled: true
  direction_break_force: true
  break_force: [1000, 10]                      # scalar N (magnitude) when direction_break_force=false;
                                         # set to [shear_N, normal_N] when direction_break_force=true
  require_contact_enabled: true
  # Surface-task params on FlatSurfaceFollowTask via dotted env_cfg overrides.
  env_cfg_overrides:
    task.desired_speed_cm_s: 5.0
    task.force_desired_min: 5.0
    task.force_desired_max: 5.0
    task.orientation_desired_angle_deg: 10.0
    task.plate_tilt_range_deg: 10.0
    # Held-cylinder spawn: TIP 1 mm above the starting keypoint (along the surface normal), peg straight
    # up/down (no rotation), no jitter. Each DOF has a mean + std; std == 0 => mean used exactly (no
    # sampling). pos = surface-local (x=along-path, y=cross-track, z=normal, m); orn = WORLD-frame
    # roll/pitch/yaw (deg), nominal = peg straight up/down.
    task.spawn_tip_pos_mean: [0.0, 0.0, 0.001]
    task.spawn_tip_pos_std: [0.0, 0.0, 0.0]
    task.spawn_orn_mean_deg: [0.0, 0.0, 0.0]   # cylinder spawns straight (perpendicular to the surface); the reset AUTO-COMPENSATES for the grasp tilt (the eef/wrist absorbs it), so leave this zero
    task.spawn_orn_std_deg: [0.0, 0.0, 0.0]
    task.observe_eef_torque: false
    task.terminate_on_lag: false
    task.terminate_on_success: true
    task.pace_lag_frac: 0.5
    task.keypoint_reward_weight: 8.0
    task.vel_based_pace_enabled: true   # velocity-based pace (reward matching v_des along d); false = legacy position pace
    task.vel_based_pace_weight: 2.0                # up from 1.0 so pace can pull as hard as the constraint terms
    task.vel_based_pace_a: 30.0                   # wider squash basin -> gradient from rest toward v_des
    task.vel_based_pace_min_speed_enabled: true   # zero pace below the min speed (hard cliff to force real motion)
    task.vel_based_pace_min_speed: 0.001          # m/s (1 mm/s)
    # --- Reset already pressing into the surface (start in contact). ---
    task.reset_press_to_contact: true
    # --- Reward-term weights (all exposed for tuning). keypoint_reward_weight and
    #     vel_based_pace_weight are set above; the rest are at their task defaults. ---
    task.force_weight: 1.0
    task.orientation_weight: 0.0
    task.contact_weight: 0.0
    task.straightness_weight: 1.0
    task.pace_weight: 1.0
    task.straightness_air_weight: 0.0
    task.pace_air_weight: 0.0
    task.success_time_weight: 600.0
    # --- Setpoint keypoint placement: false = completion/robot-driven (target waits for the arm to
    #     catch up); true = PACE-DRIVEN (target advances on the time-based pace clock at
    #     desired_speed_cm_s, never waiting). ---
    task.setpoint_pace_driven: True
    # --- Surface (plate) spawn randomness. plate_tilt_range_deg is set above. ---
    task.plate_pos_noise: [0.00, 0.00, 0.00]     # world-frame per-axis +/- spawn jitter (m)
    task.plate_yaw_range_deg: 360.0              # in-plane yaw randomization (deg)

loss_cfg:
  supervised_selection_enabled: false
  supervised_selection_policy_weight: 1.0
  supervised_selection_critic_weight: 0.0

sac_cfg:
  tensorboard: false        # log ONLY to wandb (requires experiment.wandb: true)
  gradient_steps: 2
  batch_size: 2048
  discount_factor: 0.99
  polyak: 0.005
  actor_lr: 1.0e-4
  critic_lr: 1.0e-4
  entropy_lr: 3.0e-5
  weight_decay: 1.0e-2
  random_timesteps: 0
  learning_starts: 300
  learn_entropy: true
  initial_entropy_value: 0.05
  target_entropy: -13             # -|continuous| = -13 (standard SAC; was -dim/2, lowered to curb late over-exploration)
  grad_norm_clip: 1.0
  mixed_precision: false
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: {}
  rewards_shaper_scale: 0.1
  gripper_action_idx: null
  phase_split_families: []        # peg-only (needs per_env_curr_engaged); OFF for surface
  recorder:
    enabled: false
  experiment:
    directory: simp_low-F_high-P
    experiment_name: "VICES_45.yaml"
    write_interval: 150
    checkpoint_interval: auto
    wandb: true
    wandb_kwargs:
      entity: hur

model_cfg:
  actor:
    act_init_std: 1.0
    selection_distribution: product
    actor_n: 2
    actor_latent: 512
    last_layer_scale: 0.1
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    reduction: sum
    use_state_dependent_std: false
    bernoulli_action_dims: null
    force_zero_action_dims: null
    scale_down_action_dims: null   # apply last_layer_scale to ONLY the 6 pose deltas (3 pos + 3 orient); gain/selection dims stay unshrunk so they explore
  critic:
    critic_output_init_mean: 0.0
    critic_n: 4
    critic_latent: 1024
    clip_actions: false

controller_cfg:
  # ---- control type selector (the single switch) ----
  # "pose"                  : No wrapper
  # "pose-VICES"            : Applies VICPoseWrapper (diagonal vic only)
  # "hybrid"                : HybridForcePositionWrapper (selection + force only)
  # "hybrid-vic"            : HybridVICWrapper (full raw gain mats + sel + force)
  # "ctrl-action-interface" : CtrlActionInterfaceWrapper (different parameterization of hyprid-vic)
  control_type: ctrl-action-interface

  # ---- formulation selector (the single switch) ----
  # "constant"          : fixed diagonal K from default_task_prop_gains (K_f from
  #                       default_task_force_gains); 0 extra action dims.
  # "variable_diagonal" : per-axis diagonal K, 6 dims, geometric scaling.
  # "cholesky"          : block-diagonal SPD K = blkdiag(L_pos L_posᵀ, L_rot L_rotᵀ), 12 dims
  #                       (per block: 3 L-diagonal + 3 L-off-diagonal). D = zeros for now.
  # "rotated"           : diagonal K (6) + 6-D rotation vector (6) = 12 dims; R applied as
  #                       blkdiag(R,R) to the full 6x6.
  gain_mapping: variable_diagonal #"constant" #
  #fixed_rotation_rpy: [0.0, 30.0, 0.0]   # stiffness-frame R; aligned to the 30deg grasp tilt (used only when gain_mapping=rotated)

  # Toggle force control. When false: NO selection/force-target dims, K_f = zeros, and
  # force_axes MUST be all-zero. When true: force_axes selects eligible axes (adds 2*N dims)
  # and K_f gets its own gain dims (same formulation as pose K).
  use_hybrid_force: false
  force_axes: [0, 0, 0, 0, 0, 0]   # x,y,z force-eligible (must be all-zero when use_hybrid_force=false)
  async_z_force_bounds: true
  # ---- shared per-axis bounds [x,y,z,Rx,Ry,Rz], geometric scaling k = lo*(hi/lo)^((a+1)/2) ----
  # A lower bound < ~1e-6 disables that channel (k=0) instead of producing NaN, so use > 0 for
  # meaningful variable impedance. Translation and rotation differ ~10x, hence the split values.
  gain_min: [500, 500, 500, 20, 20, 20] # pose stiffness K (position x3, rotation x3)
  gain_max: [900, 900, 900, 40, 40, 40] 

  # Policy commands the pose stiffness directly, so disable the base Forge env's per-reset
  # multiplicative gain randomization (default [0.41]x6) to avoid randomizing on top of the
  # commanded gains. Constant-mode configs keep the base default so their fixed gains stay randomized.
  task_prop_gains_noise_level: [0, 0, 0, 0, 0, 0]

  # NOT USED BEFORE
  force_gain_min: [0.35, 0.35, 0.35, 0.07, 0.07, 0.07]  # force stiffness K_f (force x3, torque x3)
  force_gain_max: [0.705, 0.705, 0.705, 0.141, 0.141, 0.141]

  # Cholesky-only: off-diagonal L entry = chol_offdiag_rho * sqrt(lo*hi) * clamp(a,-1,1).
  # 0.0 => diagonal-only (equivalent to variable_diagonal but with 12 dims). Increase to
  # allow within-block (translation- or rotation-) axis coupling.
  chol_offdiag_rho: 0.9

  # cholesky/rotated only: learn the full 6-DOF gain matrix (position + orientation)
  # instead of the translational 3x3 block alone. Changes action dim => re-tune
  # target_entropy if enabled.
  full_gain_matrix: false

  # Full 3-DOF orientation control: command roll/pitch/yaw as a delta-axis-angle rotation
  # scaled by rot_action_bounds, instead of the default yaw-only map (roll/pitch forced to 0).
  # When true, also set the actor's force_zero_action_dims=null so Rx/Ry are learnable, and
  # tune rot_action_bounds (it now governs the orientation cone). Wrapper control types only.
  full_orientation_control: false
  orientation_obs_mode: "6d_rot_mat"   # standardized: same orientation obs across all methods

  # ---- rotation action scaling (rot_action_bounds REMOVED) ----
  # EEF-relative control scales action[3:6] in [-1,1] DIRECTLY by rot_action_threshold, so it maps
  # linearly to +/- that (rad) with no separate bound (which used to saturate the range). This value
  # also caps the per-step change and becomes env.rot_threshold.
  rot_action_threshold: [0.097, 0.097, 0.097]   # Forge default (env.rot_threshold)

  # ---- hybrid force-control fields (used on force-eligible axes when use_hybrid_force) ----
  force_action_bounds: [20.0, 20.0, 20.0]
  torque_action_bounds: [0.25, 0.25, 0.25]
  force_action_threshold: [2.0, 2.0, 2.0]
  torque_action_threshold: [0.01, 0.01, 0.01]

  #default_task_prop_gains: [100, 100, 100, 30, 30, 30]
  default_task_force_gains: [0.5, 0.5, 0.5, 0.1, 0.1, 0.1]   # K_f diagonal in "constant" mode
  #default_task_force_gains: [2.8, 2.8, 2.8, 0.1, 0.1, 0.1]
  async_z_force_bounds: true
  apply_ema_force: false
  no_sel_ema: true
  ema_mode: action
  # NOTE: damping D is derived (2*sqrt(K), or zeros for cholesky), so damping_min/max are
  # unused here; gain_min/gain_max (pose stiffness) ARE used.

sensor_cfg:
  contact:
    enabled: true
    contact_force_threshold: 1.0
    log_contact_state: false
    append_to_policy_obs: false
    append_to_critic_state: true

keypoint_servo_cfg:
  # Surface keypoint-servo action override: when enabled, the wrapper drives the held-cylinder tip
  # toward the setpoint keypoint (+ constant surface-frame offsets), taking over the pose dims (and,
  # with fix_orientation, the rotation dims -> fixed_rpy_deg). All at defaults; enable + tune.
  enabled: true                # -> true to hand the pose dims to the servo
  along_track_offset: 0.0       # m along env.path_dir (start->goal travel direction)
  off_track_offset: 0.0         # m along env.d_lat (in-plane lateral, n x d)
  normal_offset: 0.01            # m along env.surface_normal
  fix_orientation: true        # -> true to also fix the EEF orientation to fixed_rpy_deg
  fixed_rpy_deg: [3.14159, 0.0, 3.14159]  # world-frame [roll, pitch, yaw] deg EEF target (used iff fix_orientation)
