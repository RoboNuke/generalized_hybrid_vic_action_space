# _record_video.yaml — per-agent recorder OVERLAY that writes an annotated BEST/MEDIAN/WORST grid mp4
# of the surface task: collect num_trajectories full episodes, rank by return, select best-4/median-4/
# worst-4, and draw the surface overlays (in-scene keypoint balls, force + orientation gauges, top-down
# path inset) on the selected 12 tiles. The annotated viz layered on top of the best/median/worst grid.
#
# Render/quality settings taken from _record.yaml (560x720 tiles, camera at z=0.35, the in-scene
# rotation-frame axis markers, fps 30). Deep-merged over an agent's snapshotted config.yaml.
#
#   python learning/record.py \
#     --agent_dir runs/surface_baselines/surface_baselines/5_GAS/0 \
#     --record_config configs/exp_cfgs/glued_surface/_record_video.yaml \
#     --headless --checkpoint_step best

# Coordinate-frame axis markers (from _record.yaml). The rotated stiffness frame only appears for
# gain_mapping=rotated agents; silently skipped otherwise.
controller_cfg:
  visualize_rotation_frame: true        # rotation R, at the peg tip (rotated mode only)
  rotation_frame_axis_scale: 0.02
  visualize_peg_tip_frame: false
  peg_tip_frame_axis_scale: 0.02
  visualize_eef_frame: false
  eef_frame_axis_scale: 0.02
  visualize_stiffness_ellipsoid: false

runner_cfg:
  num_agents: 1
  num_envs: 24              # parallel rollout width (24 trajectories/episode -> 48 in 2 episodes)
  memory_size: 50_000
  # Run the FULL episode with the new reward behavior — no early lag/success termination,
  # 5 N force target, keypoint hard-gate off (surface-task overrides; from _record_stills.yaml).
  env_cfg_overrides:
    task.terminate_on_lag: false
    task.terminate_on_success: false
    task.force_desired_min: 5.0
    task.force_desired_max: 5.0

sac_cfg:
  recorder:
    enabled: true                  # triggers TiledCamera injection in build_env
    annotated_ranked: true         # collect -> rank best/median/worst -> annotated 3x4 grid mp4
    surface_overlays: true         # keypoint balls + force/orientation gauges + top-down path inset
    ball_diameter_frac: 1.0        # diameter = keypoint spacing (enlarged for legibility)
    video_format: mp4
    num_trajectories: 48           # collect 48, select best-4/median-4/worst-4
    # Render/quality settings from _record.yaml:
    width: 560                     # per-tile RGB width  (2.5x of 240, 4:3 preserved)
    height: 720                    # per-tile RGB height (2.5x of 180, 4:3 preserved)
    camera_pos: [1.0, 0.0, 0.35]
    camera_quat: [-0.3535534, 0.6123724, 0.6123724, -0.3535534]
    focal_length: 24.0
    focus_distance: 0.05
    horizontal_aperture: 20.955
    clipping_range: [0.1, 20.0]
    fps: 30
    output_subdir: videos
