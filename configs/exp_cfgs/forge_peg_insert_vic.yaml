# Forge Peg Insertion + Variable Impedance Control (VIC / "pose-VICES").
# The VICPoseWrapper appends 3 translational-stiffness (Kp) actions to the policy, so the
# action space grows by 3 (and obs/state grow with it — handled by the wrapper).
# Unknown headers/keys are hard errors; omitted sections/fields fall back to defaults.

runner_cfg:
  task: Isaac-Forge-PegInsert-Direct-v0
  agent_type: sac                   # "sac" (default) or "ppo"; selects sac_cfg vs ppo_cfg
  num_envs: 256
  num_agents: 2
  total_timesteps: 20_000
  eval_timesteps: 150
  memory_size: 2_000_000
  seed: -1

sac_cfg:
  gradient_steps: 8
  batch_size: 1024
  discount_factor: 0.99
  polyak: 0.005
  actor_lr: 1.0e-4
  critic_lr: 1.0e-4
  entropy_lr: 1.0e-4
  weight_decay: 1.0e-2
  random_timesteps: 0
  learning_starts: 1500
  learn_entropy: true
  initial_entropy_value: 1.0e-2
  target_entropy: -4.0              # x,y,z,yaw,success + 3 VIC gains = 8 effective dims (8/2)
  grad_norm_clip: 0.0
  mixed_precision: false
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: {}
  rewards_shaper_scale: null
  gripper_action_idx: null
  recorder:
    enabled: false
  experiment:
    directory: forge_pih_vic
    experiment_name: ""
    write_interval: 150
    checkpoint_interval: auto

model_cfg:
  actor:
    act_init_std: 1.0
    selection_distribution: product  # hybrid-only: "product" (independent) or "match" (selection-conditioned)
    selection_init_bias: 0.0           # hybrid-only: init selection logit bias; sigmoid(bias)=init force prob (neg => position-dominant)
    actor_n: 1
    actor_latent: 128
    last_layer_scale: 0.1
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    reduction: sum
    use_state_dependent_std: false
    bernoulli_action_dims: null
    force_zero_action_dims: [3, 4]   # Forge zeros pose Rx,Ry; gain dims are appended after
  critic:
    critic_output_init_mean: 0.0
    critic_n: 2
    critic_latent: 1024
    clip_actions: false

controller_cfg:
  control_type: pose-VICES
  # default_task_prop_gains (base) is the nominal Kp; VIC commands translational Kp within
  # the first 3 of the shared gain_min/gain_max (x,y,z). Kd auto-set to 2*sqrt(Kp).
  default_task_prop_gains: [565.0, 565.0, 565.0, 28.0, 28.0, 28.0]
  # Shared per-axis stiffness bounds [x,y,z,Rx,Ry,Rz]; VIC uses only the first 3.
  gain_min: [100.0, 100.0, 100.0, 5.0, 5.0, 5.0]
  gain_max: [1000.0, 1000.0, 1000.0, 100.0, 100.0, 100.0]
  apply_ema_to_gains: false

sensor_cfg:
  contact:
    enabled: true                  # mount an IsaacLab ContactSensor on the peg, filtered vs the hole
    contact_force_threshold: 1.0   # N; per-axis EE-frame |force| above this => in contact (1.0 matches upstream)
    log_contact_state: true        # log Contact / In-Contact {X,Y,Z,Any} fractions to TensorBoard
