# Forge Peg Insertion — Isaac Lab direct-API task. action_space=7, obs=21, state=72
# (asymmetric actor-critic auto-detected). Episode: 10s @ 15Hz = 150 steps.
# Unknown headers/keys are hard errors; omitted sections/fields fall back to defaults.

runner_cfg:
  task: Isaac-Forge-PegInsert-Direct-v0
  agent_type: sac                   # "sac" (default) or "ppo"; selects sac_cfg vs ppo_cfg
  num_envs: 256                     # Forge default scene num_envs is 128; can scale up
  num_agents: 2
  total_timesteps: 20_000           # env.step() calls; transitions = total_timesteps * num_envs * num_agents
  eval_timesteps: 150               # env.step() calls (~1 PegInsert episode at 150 steps)
  memory_size: 2_000_000            # replay buffer capacity PER AGENT
  seed: -1                          # -1 = non-deterministic

sac_cfg:
  gradient_steps: 8
  batch_size: 1024
  discount_factor: 0.99
  polyak: 0.005
  actor_lr: 1.0e-4                  # AdamW
  critic_lr: 1.0e-4                 # AdamW
  entropy_lr: 1.0e-4                # AdamW (weight_decay always 0 for entropy)
  weight_decay: 1.0e-2              # decoupled weight decay applied to actor + critic
  random_timesteps: 0
  learning_starts: 1500
  learn_entropy: true
  initial_entropy_value: 1.0e-2
  target_entropy: -2.5                # null => skrl picks -|num_continuous|
  grad_norm_clip: 0.0
  mixed_precision: false
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: {}
  rewards_shaper_scale: null
  gripper_action_idx: null          # no gripper on Forge tasks
  recorder:
    enabled: false                  # TiledCamera unusable on this IsaacSim/driver/GPU combo;
                                    # see configs/exp_cfgs/default.yaml for the full block.
  experiment:
    directory: forge_pih
    experiment_name: ""             # empty => runner auto-generates as <task>_sac_N<num_agents>
    write_interval: 150             # one episode per write
    checkpoint_interval: auto

model_cfg:
  actor:
    act_init_std: 1.0
    selection_distribution: product  # hybrid-only: "product" (independent) or "match" (selection-conditioned)
    selection_init_bias: 0.0           # hybrid-only: init selection logit bias; sigmoid(bias)=init force prob (neg => position-dominant)
    actor_n: 1
    actor_latent: 128
    last_layer_scale: 0.1           # tiny init → small initial actions, less tanh saturation
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    reduction: sum
    use_state_dependent_std: false
    bernoulli_action_dims: null     # all-continuous (no binary gripper)
    force_zero_action_dims: [3, 4]  # Forge sets actions[:, 3:5] = 0 internally
  critic:
    critic_output_init_mean: 0.0
    critic_n: 2
    critic_latent: 1024
    clip_actions: false

sensor_cfg:
  contact:
    enabled: true                  # mount an IsaacLab ContactSensor on the peg, filtered vs the hole
    contact_force_threshold: 1.0   # N; per-axis EE-frame |force| above this => in contact (1.0 matches upstream)
    log_contact_state: true        # log Contact / In-Contact {X,Y,Z,Any} fractions to TensorBoard
